# Deployment for the MLflow UI on AKS.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-ui
  labels:
    app.kubernetes.io/name: mlflow-ui
    app.kubernetes.io/part-of: voyage-flight-mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-ui
  template:
    metadata:
      labels:
        app: mlflow-ui
        app.kubernetes.io/name: mlflow-ui
        app.kubernetes.io/part-of: voyage-flight-mlops
    spec:
      containers:
        - name: mlflow-ui
          image: acrvoyagemlopspr01.azurecr.io/voyage/flight-mlflow-ui:20260421-2
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: MLFLOW_ALLOWED_HOSTS
              valueFrom:
                secretKeyRef:
                  name: mlflow-config-secret
                  key: allowed-hosts
            - name: MLFLOW_CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: mlflow-config-secret
                  key: cors-allowed-origins
          volumeMounts:
            - name: mlflow-runs
              mountPath: /app/mlruns
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: mlflow-runs
          azureFile:
            secretName: azure-files-secret
            shareName: mlflow-runs-share
            readOnly: false
---
# ClusterIP service for the MLflow UI.
apiVersion: v1
kind: Service
metadata:
  name: mlflow-ui
  labels:
    app.kubernetes.io/name: mlflow-ui
    app.kubernetes.io/part-of: voyage-flight-mlops
spec:
  selector:
    app: mlflow-ui
  ports:
    - name: http
      port: 5000
      targetPort: 5000
